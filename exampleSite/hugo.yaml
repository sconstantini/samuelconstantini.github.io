languages:
  en:
    label: "English"
    weight: 1
    contentDir: "content"
    params:
      hero:
        intro: "Hi, my name is"
        title: "Samuel Constantini."
        subtitle: "Key Account Manager"
        content: "Builder-minded Enterprise SaaS and Key Account Management professional with experience managing strategic relationships, revenue growth, and complex B2B projects for companies such as The Coca-Cola Company, Walmart, JBS, AB InBev, and Nestlé."
        button:
          name: "Resume"
      about:
        title: "About Me"
        content: |- 
          "Brazilian SaaS and Enterprise Account Management professional with a strong passion for technology, business, and building things that create real impact. Over the years, I've worked with companies such as Embraer and Accenture, while managing strategic relationships and projects involving major enterprise clients like The Coca-Cola Company, JBS, AB InBev, and Nestlé. 
        
          My background combines enterprise sales, key account management, fintech, SaaS, and market intelligence, always with a builder mindset. I enjoy connecting business strategy, technology, and customer relationships to solve complex problems, create scalable solutions, and drive long-term growth. Comfortable in both executive conversations and technical environments, I'm naturally curious, hands-on, and motivated by innovation and continuous learning."
        skills:
          title: "My tech Stack:"
          items:
            - "teste"
            - "teste2"
      experience:
        items:
          - company: "Ailet"
            companyUrl: "https://ailet.com"
            jobs:
              - name: "Key Account Manager"
                date: "May 2023 - May 2026"
                content: |-
                  - Book of Business of 10+ strategic enterprise accounts across 7 countries.
                  - Fortune 500 clients: Coca-Cola, Walmart, ABInBev, Nestlé, Merck, Sanofi, Arcor.
                  - Shipped 12% YoY revenue growth, increased LTV by 20% in 2025.
                  - Led 10+ cross-functional projects, improving customer satisfaction and retention.
                  - Multilingual support (EN/ES/PT)
          - company: "WATTio"
            companyUrl: "https://www.wattio.com.br/"
            jobs:
              - name: "Sales Manager"
                date: "May 2022 - May 2023"
                content: |-
                  - Expanded the revenue pipeline by 55%.
                  - Lead a team of 3 across Onboarding and Revenue Operations.
          - company: "Asaas"
            companyUrl: "https://www.asaas.com"
            jobs:
              - name: "Business Development & Customer Engagement Analyst"
                date: "May 2021 - May 2022"
                content: |-
                  - Identified over 500 high fit proespects with 90% match ICP accuracy using NLP/ML tools.
                  - Partnered with BDR and SDR teams for improving MQL outreach by 110%.
          - company: "teepad"
            jobs:
              - name: "Commercial Consultant - SaaS & Channel Growth"
                date: "Aug 2020 - May 2021"
                content: |-
                  - Managed outbound sales operations and developed consultative selling strategies to accelerate software adoption among partners and mid-market companies.
          - company: "Accenture"
            companyUrl: "https://accenture.com"
            jobs:
              - name: "Senior Business Analyst - Customer Operations & Business Intelligence"
                date: "Aug 2018 - Aug 2020"
                content: |-
                  - Led a team of 15 members in the BPO operation for Indirect Supplies procurement, managing high-value enterprise contracts (BRL 300K+/year each)
                  - 100% of backlog cleared for the first time ever in the customers operations history.
          - company: "W1 Consultoria Financeira"
            companyUrl: "https://www.w1.com.br/"
            jobs:
              - name: "Finance Consulting Trainee"
                date: "Jul 2018 - Sep 2019"
                content: "B2C independent financial consultant focused on account development and handling."
          - company: "Embraer"
            companyUrl: "https://embraer.com"
            jobs:
              - name: "Key Account Manager Assistant"
                date: "May 2016 - Oct 2017"
                content: |-
                  - Participated in the executive jets delivery of over 12 key customers.
                  - Top stakeholders included: FlexJet, Daycoval, JBS, Rimowa, and more.
          - company: "OSCAR PowerSpares GmbH & Co"
            jobs:
              - name: "Intern"
                date: "Jul 2013 - Jan 2014"
                content: "Database management and development in Microsoft Office (Excel, Access and Outlook). Müelheim an der Ruhr, Germany."
      education:
        items:
          - title: "B.Sc., Mechanical Engineering"
            school:
              name: "UNIFEI - Universidade Federal de Itajubá"
              url: "https://unifei.edu.br"
            date: "2009 - 2018"
          - title: "B.Sc., Mechanical Engineering (Exchange)"
            school:
              name: "Universität Duisburg-Essen"
              url: "https://uni-due.de"
            date: "2012 - 2014"
            content: "Production and Project Management, Computational Fluid Dynamics."
          - title: "B.Sc., Aerospace Engineering (Exchange)"
            school:
              name: "Universidad Pontificia Bolivariana"
              url: "https://upb.edu.co"
            date: "2011"
            content: "Aerodynamics and Wind Tunnel Lab, Thermodynamics, Aerospace Materials and Strength of Materials."
      projects:
        items:
          - title: "Lead Lookalikes using NLP (No AI yet)"
            content: "How I used Natural Language Processing to identify over 300 high-fit prospects for ASAAS"
            image: /images/projects/icpcover.jpg
            featured:
              name: "View Case"
              link: /projects/lead-segmentation-asaas
            badges:
              - "ICP"
              - "Sales Strategy"
              - "Fintech"
              - "Data Analytics"
      achievements:
        items:
          - title: "ACHIEVEMENT TITLE"
            content: "ACHIEVEMENT DESCRIPTION"
            url: "https://example.com"
            image: /images/achievement.jpg
      contact:
        content: "My inbox is always open. Feel free to reach out!"
        btnName: "Email Me"
        btnLink: "mailto:samuelv.constantini@gmail.com"


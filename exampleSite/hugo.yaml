params:
  title: "Samuel Constantini"
  description: "Samuel Constantini - Portfolio"
  favicon: /fav.png
  animate: true

  # Color theme (dark/light)
  theme:
    defaultTheme: "dark"

  # Navbar
  navbar:
    disableSearch: true
    stickyNavBar:
      enable: true
      showOnScrollUp: true

  # Hero section (global: image, button URL, social links)
  hero:
    enable: true
    image: /images/hero.jpg
    roundImage: true
    bottomImage:
      enable: true
    button:
      enable: true
      url: /resume.pdf
      download: false
      newPage: true
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: "https://github.com/sconstantini"
        - icon: fab fa-linkedin
          url: "https://linkedin.com/in/samuelconstantini"

  # About section (global: image)
  about:
    enable: true
    image: /images/me.jpg
    skills:
      enable: true

  # Experience section
  experience:
    enable: true

  # Education section
  education:
    enable: true

  # Projects section
  projects:
    enable: true

  # Achievements section
  achievements:
    enable: true

  # Contact section
  contact:
    enable: true
    formspree:
      enable: false
      formId: ""

  # Footer
  footer:
    recentPosts:
      path: "blogs"
      count: 3
      title: "Recent Posts"
      enable: false
      disableFeaturedImage: false
    socialNetworks:
      github: "https://github.com/sconstantini"
      linkedin: "https://linkedin.com/in/samuelconstantini"
